services:
  whisper-bench:
    build: .
    ports:
      - "${WHISPER_BENCH_PORT:-5000}:5000"
    environment:
      - WHISPER_BENCH_WHISPER_MODEL=${WHISPER_BENCH_WHISPER_MODEL:-base}
      - WHISPER_BENCH_LOG_LEVEL=${WHISPER_BENCH_LOG_LEVEL:-INFO}
    volumes:
      - ./.runtime/corpus:/app/corpus:ro
      - ./.runtime/results:/app/results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import httpx; r=httpx.get('http://localhost:5000/health'); assert r.status_code==200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
