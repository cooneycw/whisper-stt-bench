services:
  whisper-bench:
    build: .
    ports:
      - "${WHISPER_BENCH_PORT:-5000}:5000"
    environment:
      - WHISPER_BENCH_WHISPER_MODEL=${WHISPER_BENCH_WHISPER_MODEL:-distil-large-v3}
      - WHISPER_BENCH_LOG_LEVEL=${WHISPER_BENCH_LOG_LEVEL:-INFO}
      - WHISPER_BENCH_BEARER_TOKEN=${WHISPER_BENCH_BEARER_TOKEN:-}
      - WHISPER_BENCH_AWS_SECRET_NAME=${WHISPER_BENCH_AWS_SECRET_NAME:-}
      - WHISPER_BENCH_AWS_REGION=${WHISPER_BENCH_AWS_REGION:-us-east-1}
      - AWS_SECRET_SOURCE=${AWS_SECRET_SOURCE:-auto}
      - AWS_SECRETSMANAGER_AGENT_ENDPOINT=${AWS_SECRETSMANAGER_AGENT_ENDPOINT:-http://127.0.0.1:2773}
      - AWS_SECRETSMANAGER_AGENT_ATTEMPTS=${AWS_SECRETSMANAGER_AGENT_ATTEMPTS:-30}
      - AWS_SECRETSMANAGER_AGENT_RETRY_DELAY=${AWS_SECRETSMANAGER_AGENT_RETRY_DELAY:-1}
      - AWS_TOKEN=file:///run/awssmatoken/token
    volumes:
      - ./.runtime/corpus:/app/corpus:ro
      - ./.runtime/results:/app/results
      # Do not mount over /var/run; the NVIDIA runtime hook writes there during container startup.
      - awssmatoken:/run/awssmatoken:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import httpx; r=httpx.get('http://localhost:5000/health'); assert r.status_code==200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  whisper-secrets-agent:
    build:
      context: ./infra/secrets-manager-agent
      args:
        AWS_SM_AGENT_VERSION: ${AWS_SM_AGENT_VERSION:-v1.2.1}
    container_name: whisper-secrets-agent
    network_mode: "service:whisper-bench"
    environment:
      - HOME=/root
      - AWS_REGION=${WHISPER_BENCH_AWS_REGION:-us-east-1}
      - AWS_DEFAULT_REGION=${WHISPER_BENCH_AWS_REGION:-us-east-1}
      - AWS_PROFILE=${AWS_PROFILE:-default}
      - AWS_SDK_LOAD_CONFIG=1
      - AWS_SHARED_CREDENTIALS_FILE=/root/.aws/credentials
      - AWS_CONFIG_FILE=/root/.aws/config
      - AWS_TOKEN_FILE_PATH=/run/awssmatoken/token
    volumes:
      - awssmatoken:/run/awssmatoken
      - ${WHISPER_BENCH_AWS_CREDENTIALS_DIR:-/home/cooneycw/.aws}:/root/.aws:ro
    restart: unless-stopped
    profiles: ["secrets"]

volumes:
  awssmatoken:
