# Woodpecker CI Agent for GPU VM (192.168.7.61)
#
# Serves all three projects on this host:
#   - whisper-stt-bench  (GPU Whisper STT service)
#   - voice-bot-acs      (voice bot backend)
#   - personas-service   (persona management)
#
# Setup:
#   1. Copy agent.env.example -> agent.env and fill in values
#   2. docker compose up -d
#
# Requires Tailscale connectivity to the Woodpecker server.

services:
  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:v3.13.0
    # NOTE: name and env below match the agent actually running on the GPU
    # VM (which also serves cooneycw/agentic-asst). watchdog.sh keys off
    # this container name — keep them in sync.
    container_name: woodpecker-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: agent.env
    environment:
      - WOODPECKER_MAX_WORKFLOWS=2
      - WOODPECKER_AGENT_LABELS=deploy-host=gpu-vm
      - WOODPECKER_HOSTNAME=proxVMwhisper43
      - WOODPECKER_GRPC_SECURE=false
    restart: unless-stopped
