when:
  - event: [push, pull_request, manual]

# CI steps run on proxVMvoice18 (deploy-host label), not the GPU VM.
# This keeps the GPU VM free for actual inference workloads.
# DEPENDENCY: If proxVMvoice18 is down, Whisper CI cannot run,
# which blocks deploys (deploy-local.yml depends_on: ci).
# Break-glass: SSH to the GPU VM and run `make deploy` directly.
labels:
  platform: linux/amd64
  deploy-host: proxVMvoice18

steps:
  shared-pipeline-hash:
    image: python:3.12-slim-bookworm
    commands:
      - python3 scripts/check_shared_pipeline_hashes.py

  # --- Stage 1: Fast checks (parallel) ---
  lint:
    image: python:3.12-slim-bookworm
    commands:
      - pip install uv
      - uv sync --extra dev
      - uv run ruff check .

  secret-scan:
    image: zricethezav/gitleaks:latest
    commands:
      - gitleaks detect --source . -v

  dockerfile-lint:
    image: hadolint/hadolint:latest-alpine
    commands:
      - hadolint Dockerfile

  # --- Stage 2: Tests (after lint) ---
  test:
    image: python:3.12-slim-bookworm
    depends_on: [lint]
    commands:
      - pip install uv
      - uv sync --extra dev
      - uv run pytest -m "not gpu and not benchmark and not live" -q

  typecheck:
    image: python:3.12-slim-bookworm
    depends_on: [lint]
    commands:
      - pip install uv
      - uv sync --extra dev
      - uv run python -m compileall src tests scripts

  dependency-audit:
    image: python:3.12-slim-bookworm
    depends_on: [lint]
    failure: ignore
    commands:
      - pip install uv
      - uv sync --extra dev
      - uv run pip-audit --local
