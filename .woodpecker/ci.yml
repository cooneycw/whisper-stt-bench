when:
  - event: [push, pull_request, manual]

# CI steps run on the GPU VM's own agent (deploy-host=gpu-vm), the same
# agent that runs deploy-local.yml. All steps are CPU-only and lightweight,
# so inference impact is negligible, and whisper CI/CD has no dependency on
# any other host being up. (Previously pinned to proxVMvoice18, which took
# whisper CI down whenever that VM was offline.)
# Break-glass if this agent is down: SSH to the GPU VM, restart the agent
# (docker restart woodpecker-agent), or run `make deploy` directly.
labels:
  platform: linux/amd64
  deploy-host: gpu-vm

steps:
  shared-pipeline-hash:
    image: python:3.12.13-slim-bookworm
    commands:
      - python3 scripts/check_shared_pipeline_hashes.py

  # --- Stage 1: Fast checks (parallel) ---
  lint:
    image: python:3.12.13-slim-bookworm
    commands:
      - pip install uv
      - uv sync --extra dev
      - uv run ruff check .

  secret-scan:
    image: zricethezav/gitleaks:v8.18.4
    commands:
      - gitleaks detect --source . -v

  dockerfile-lint:
    image: hadolint/hadolint:v2.12.0-alpine
    commands:
      - hadolint Dockerfile

  # --- Stage 2: Tests (after lint) ---
  test:
    image: python:3.12.13-slim-bookworm
    depends_on: [lint]
    commands:
      - pip install uv
      - uv sync --extra dev
      - uv run pytest -m "not gpu and not benchmark and not live" -q

  typecheck:
    image: python:3.12.13-slim-bookworm
    depends_on: [lint]
    commands:
      - pip install uv
      - uv sync --extra dev
      - uv run python -m compileall src tests scripts

  dependency-audit:
    image: python:3.12.13-slim-bookworm
    depends_on: [lint]
    failure: ignore
    commands:
      - pip install uv
      - uv sync --extra dev
      - uv run pip-audit --local
