when:
  - event: push
    branch: main
  - event: manual
    branch: main

labels:
  platform: linux/amd64
  deploy-host: gpu-vm

depends_on:
  - ci

steps:
  deploy-local:
    image: ghcr.io/cooneycw/ci-deploy:3.12
    pull: false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/cooneycw/.aws:/home/cooneycw/.aws:ro
      - /home/cooneycw/.config/gh:/root/.config/gh:ro
      - /home/cooneycw/Projects:/home/cooneycw/Projects
    commands:
      - bash scripts/woodpecker_deploy.sh
